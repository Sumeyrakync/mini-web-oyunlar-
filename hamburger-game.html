<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hamburger Treni Sesli</title>
    <style>
        body {
            background-color: #3e2723;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Comic Sans MS', 'Arial', sans-serif;
            overflow: hidden;
            touch-action: none; 
        }
        
        canvas {
            background-color: #2ecc71;
            box-shadow: 0 0 30px rgba(0,0,0,0.6);
            border: 15px solid #5d4037;
            border-radius: 12px;
            image-rendering: pixelated; 
        }

        #scoreBoard {
            font-size: 26px;
            margin-bottom: 10px;
            font-weight: bold;
            color: #f1c40f;
            text-shadow: 2px 2px 0px #000;
        }

        #startMessage {
            font-size: 16px;
            color: #ecf0f1;
            margin-bottom: 5px;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% { opacity: 0.5; }
        }

        .controls {
            margin-top: 20px;
            display: grid;
            grid-template-columns: 80px 80px 80px;
            grid-gap: 10px;
        }
        .btn {
            width: 80px;
            height: 80px;
            background-color: #d35400;
            border: 4px solid #a04000;
            border-radius: 50%;
            color: white;
            font-size: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            box-shadow: 0 5px #6e2c00;
        }
        .btn:active {
            background-color: #e67e22;
            box-shadow: 0 2px #6e2c00;
            transform: translateY(3px);
        }
        .placeholder { visibility: hidden; }
    </style>
</head>
<body>

    <div id="scoreBoard">🍔 Sayısı: <span id="score">1</span></div>
    <div id="startMessage">Başlamak için bir tuşa bas!</div>
    
    <canvas id="gameCanvas" width="340" height="340"></canvas>

    <div class="controls">
        <div class="placeholder"></div>
        <button class="btn" onclick="handleInput('UP')">⬆️</button>
        <div class="placeholder"></div>
        <button class="btn" onclick="handleInput('LEFT')">⬅️</button>
        <button class="btn" onclick="handleInput('DOWN')">⬇️</button>
        <button class="btn" onclick="handleInput('RIGHT')">➡️</button>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const msgElement = document.getElementById("startMessage");

        const box = 34; 
        
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        
        let snake = [];
        snake[0] = { x: 4 * box, y: 5 * box };

        const ingredients = ['🍅', '🥩', '🥬', '🧀', '🍟', '🥤'];
        
        // --- SES EFEKTİ SİSTEMİ (AudioContext) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playEatSound() {
            // Ses bağlamı askıdaysa (tarayıcı kısıtlaması) başlat
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.type = 'square'; // Atari tarzı kare dalga
            oscillator.frequency.setValueAtTime(300, audioCtx.currentTime); // Başlangıç frekansı
            oscillator.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.1); // Bitiş frekansı (inceye doğru)

            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime); // Ses seviyesi (0.1 ideal, çok bağırmasın)
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.1); // 0.1 saniye sürsün
        }

        // --- GÜVENLİ YEM OLUŞTURMA SİSTEMİ ---
        function generateFood() {
            let newFood;
            let isOnSnake;
            
            // Yılanın üstüne gelmeyene kadar rastgele konum dene
            do {
                isOnSnake = false;
                newFood = {
                    x: Math.floor(Math.random() * (canvas.width / box)) * box,
                    y: Math.floor(Math.random() * (canvas.height / box)) * box,
                    type: ingredients[Math.floor(Math.random() * ingredients.length)]
                };

                // Yılanın tüm parçalarını kontrol et
                for (let part of snake) {
                    if (part.x === newFood.x && part.y === newFood.y) {
                        isOnSnake = true;
                        break;
                    }
                }
            } while (isOnSnake);

            return newFood;
        }

        let food = generateFood(); // İlk yemi oluştur

        let score = 1;
        let d; 
        let nextDirection; 
        let isGameRunning = true;
        
        let lastTime = 0;
        const gameSpeed = 180; 

        document.addEventListener("keydown", (event) => {
            let key = event.keyCode;
            let dir = null;
            if (key == 37) dir = "LEFT";
            else if (key == 38) dir = "UP";
            else if (key == 39) dir = "RIGHT";
            else if (key == 40) dir = "DOWN";
            
            if (dir) handleInput(dir);
        });

        function handleInput(newDir) {
            // Tarayıcı kısıtlamasını aşmak için ses motorunu uyandır
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            if (!d) {
                d = newDir;
                nextDirection = newDir;
                msgElement.style.display = 'none';
                window.requestAnimationFrame(gameLoop);
                return;
            }

            if (newDir == "LEFT" && d == "RIGHT") return;
            if (newDir == "RIGHT" && d == "LEFT") return;
            if (newDir == "UP" && d == "DOWN") return;
            if (newDir == "DOWN" && d == "UP") return;

            nextDirection = newDir;
        }

        function collision(head, array) {
            for (let i = 0; i < array.length; i++) {
                if (head.x == array[i].x && head.y == array[i].y) {
                    return true;
                }
            }
            return false;
        }

        function gameLoop(currentTime) {
            if (!isGameRunning) return;

            window.requestAnimationFrame(gameLoop);

            const secondsSinceLastRender = (currentTime - lastTime) / 1000;
            if (secondsSinceLastRender < gameSpeed / 1000) return;

            lastTime = currentTime;

            update();
            draw();
        }

        function update() {
            if (!d) return; 

            d = nextDirection;

            let snakeX = snake[0].x;
            let snakeY = snake[0].y;

            if (d == "LEFT") snakeX -= box;
            if (d == "UP") snakeY -= box;
            if (d == "RIGHT") snakeX += box;
            if (d == "DOWN") snakeY += box;

            // Çarpışma
            if (snakeX < 0 || snakeX >= canvas.width || 
                snakeY < 0 || snakeY >= canvas.height || 
                collision({x: snakeX, y: snakeY}, snake)) {
                
                isGameRunning = false;
                setTimeout(() => {
                    alert("Hamburger Dağıldı! 🍔\nToplam: " + score);
                    location.reload();
                }, 50);
                return;
            }

            // Yeme
            if (snakeX == food.x && snakeY == food.y) {
                score++;
                scoreElement.innerHTML = score;
                playEatSound(); // <--- SESİ BURADA ÇALIYORUZ
                food = generateFood(); // <--- GÜVENLİ YEM OLUŞTURMA
            } else {
                snake.pop(); 
            }

            let newHead = { x: snakeX, y: snakeY };
            snake.unshift(newHead);
        }

        function draw() {
            ctx.fillStyle = "#2ecc71";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.font = "30px Arial";
            for (let i = 0; i < snake.length; i++) {
                ctx.fillText('🍔', snake[i].x + box/2, snake[i].y + box/2 + 2);
            }

            ctx.fillText(food.type, food.x + box/2, food.y + box/2 + 2);
        }

        draw();

    </script>
</body>
</html>
